<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>docsify-pytutor Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'docsify-pytutor',
      repo: 'sherlockmen/docsify-pytutor',
      loadSidebar: false,
      subMaxLevel: 2,
      coverpage: false,
      homepage: '../README.md',
      pytutor: {
        autoplay: {
          interval: 900,
          warmupMs: 650,
          startButtonText: '开始',
          pauseButtonText: '暂停'
        },
        ui: {
          showNote: false,
          maxWidth: '1080px',
          heightPreset: 'comfortable',
          layoutMode: 'auto',
          showExpandButton: true,
          expandButtonText: '展开查看',
          collapseButtonText: '退出展开',
          baseHeight: 760,
          lineHeight: 24,
          minHeight: 680,
          maxHeight: 1200,
          mobileMinHeight: 480,
          codeDivMaxHeight: 760
        }
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="../dist/docsify-pytutor.js"></script>
</body>
</html>
