<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>docsify-pytutor Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'docsify-pytutor',
      repo: 'sherlockmen/docsify-pytutor',
      loadSidebar: false,
      subMaxLevel: 2,
      coverpage: false,
      homepage: 'README.md',
      pytutor: {
        ui: {
          showNote: false,
          maxWidth: '960px',
          baseHeight: 420,
          lineHeight: 24,
          minHeight: 420,
          maxHeight: 1400,
          mobileMinHeight: 420,
          codeDivMaxHeight: 960
        }
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="../dist/docsify-pytutor.js"></script>
</body>
</html>
