<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>docsify-pytutor-plugin Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'docsify-pytutor-plugin',
      repo: '',
      loadSidebar: false,
      subMaxLevel: 2,
      pytutor: {
        ui: {
          showNote: false,
          maxWidth: '960px',
          aspectRatio: '2.35 / 1',
          minHeight: '400px',
          maxHeight: '500px'
        }
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="../dist/docsify-pytutor.js"></script>
</body>
</html>
